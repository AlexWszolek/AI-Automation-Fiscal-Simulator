# Light, report-style theme — warm cream page, serif body (the site reads like a policy
# document, not a dashboard); red is reserved for fiscal damage.
[theme]
base = "light"
primaryColor = "#2c5f8a"                 # deep blue: buttons, sliders, focus states
backgroundColor = "#faf8f3"              # warm cream, not dashboard white
secondaryBackgroundColor = "#f1ede3"     # sidebar + widget wells, a step deeper
textColor = "#1a1f2b"
font = "serif"
# categorical series palette (colorblind-aware, professional); charts also set colors explicitly
chartCategoricalColors = [
  "#3b6ea5",  # blue
  "#d9a441",  # amber
  "#4e937a",  # teal-green
  "#b3554d",  # muted red
  "#7d6ca3",  # purple
  "#6b7b8c",  # slate
  "#a98467",  # brown
]
