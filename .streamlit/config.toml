# Light, report-style theme — near-white warm surfaces, Times-New-Roman serif (the site reads
# like a policy document, not a dashboard); red is reserved for fiscal damage.
[theme]
base = "light"
primaryColor = "#2c5f8a"                 # deep blue: buttons, sliders, focus states
backgroundColor = "#fcfbf8"              # warm near-white page (was cream)
secondaryBackgroundColor = "#f4f2ec"     # widget wells, one quiet step down
textColor = "#1a1a18"
font = "'Times New Roman', Times, 'Liberation Serif', Tinos, serif"
headingFont = "'Times New Roman', Times, 'Liberation Serif', Tinos, serif"
showSidebarBorder = true                 # both surfaces are near-white; the border is the boundary
# categorical series palette (colorblind-aware, professional); charts also set colors explicitly
chartCategoricalColors = [
  "#3b6ea5",  # blue
  "#d9a441",  # amber
  "#4e937a",  # teal-green
  "#b3554d",  # muted red
  "#7d6ca3",  # purple
  "#6b7b8c",  # slate
  "#a98467",  # brown
]

[theme.sidebar]
backgroundColor = "#fefdfb"              # the lever panel reads white
secondaryBackgroundColor = "#f4f2ec"
